<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FishFresh — Admin Panel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:#0F1623;color:#E2E8F0;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#1A2436;}
  ::-webkit-scrollbar-thumb{background:#2D3E55;border-radius:6px;}
  .sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:#0A1020;border-right:1px solid #1E2D42;display:flex;flex-direction:column;z-index:100;}
  .main{margin-left:240px;min-height:100vh;background:#0F1623;}
  .topbar{background:#0A1020;border-bottom:1px solid #1E2D42;padding:0 28px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;}
  .content{padding:28px;}
  .card{background:#131E2E;border:1px solid #1E2D42;border-radius:16px;padding:24px;}
  .card-sm{background:#131E2E;border:1px solid #1E2D42;border-radius:12px;padding:16px;}
  .btn-primary{background:linear-gradient(135deg,#FF6B4A,#FF8C6E);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,107,74,.35);}
  .btn-outline{background:transparent;color:#94A3B8;border:1px solid #2D3E55;padding:8px 16px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;}
  .btn-outline:hover{border-color:#FF6B4A;color:#FF6B4A;}
  .btn-danger{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2);padding:8px 14px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:12px;cursor:pointer;}
  .btn-success{background:rgba(34,197,94,.1);color:#22C55E;border:1px solid rgba(34,197,94,.2);padding:8px 14px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:12px;cursor:pointer;}
  .input{background:#0A1020;border:1px solid #2D3E55;border-radius:10px;padding:11px 14px;color:#E2E8F0;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;width:100%;transition:border .2s;}
  .input:focus{border-color:#FF6B4A;}
  .select{background:#0A1020;border:1px solid #2D3E55;border-radius:10px;padding:11px 14px;color:#E2E8F0;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;cursor:pointer;}
  .select:focus{border-color:#FF6B4A;}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge-success{background:rgba(34,197,94,.12);color:#22C55E;}
  .badge-warning{background:rgba(234,179,8,.12);color:#EAB308;}
  .badge-blue{background:rgba(59,130,246,.12);color:#3B82F6;}
  .badge-orange{background:rgba(255,107,74,.12);color:#FF6B4A;}
  .badge-gray{background:rgba(148,163,184,.1);color:#94A3B8;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:14px 16px;color:#64748B;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid #1E2D42;}
  td{padding:14px 16px;border-bottom:1px solid #1A2436;font-size:14px;color:#CBD5E1;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#1A2436;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;border-radius:10px;margin:2px 12px;cursor:pointer;color:#64748B;font-size:14px;font-weight:600;transition:all .2s;}
  .nav-item:hover{background:#1A2436;color:#CBD5E1;}
  .nav-item.active{background:linear-gradient(135deg,rgba(255,107,74,.15),rgba(255,107,74,.05));color:#FF6B4A;border:1px solid rgba(255,107,74,.2);}
  .stat-card{background:linear-gradient(135deg,#131E2E,#1A2436);border:1px solid #1E2D42;border-radius:16px;padding:22px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.08;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;}
  .modal{background:#131E2E;border:1px solid #1E2D42;border-radius:20px;padding:28px;width:520px;max-height:90vh;overflow-y:auto;max-width:95vw;}
  .toggle{position:relative;display:inline-block;width:46px;height:24px;}
  .toggle input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:#2D3E55;border-radius:30px;transition:.3s;}
  .slider:before{position:absolute;content:'';height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
  input:checked+.slider{background:linear-gradient(135deg,#FF6B4A,#FF8C6E);}
  input:checked+.slider:before{transform:translateX(22px);}
  .otp-box{background:#0A1020;border:2px solid #22C55E;border-radius:12px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .fish-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .fish-opt{border:2px solid #2D3E55;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;background:#0A1020;}
  .fish-opt:hover{border-color:#FF6B4A;}
  .fish-opt.selected{border-color:#FF6B4A;background:rgba(255,107,74,.08);}
  .progress-bar{background:#1E2D42;border-radius:10px;height:8px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#FF6B4A,#FF8C6E);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn .35s ease forwards;}
  .label{display:block;font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .section-title{font-size:18px;font-weight:800;color:#F1F5F9;letter-spacing:-.3px;}
  .divider{border:none;border-top:1px solid #1E2D42;margin:20px 0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── MOCK DATA ─────────────────────────────────────────────

  {id:1, name:'Rohu',        emoji:'🐟', category:'Freshwater', price:260, stock:18, active:true,  custom:false},
  {id:2, name:'Pomfret',     emoji:'🐡', category:'Saltwater',  price:420, stock:10, active:true,  custom:false},
  {id:3, name:'Tiger Prawns',emoji:'🦐', category:'Prawns',     price:480, stock:8,  active:true,  custom:false},
  {id:4, name:'Mud Crab',    emoji:'🦀', category:'Crab',       price:650, stock:5,  active:true,  custom:false},
  {id:5, name:'Seer Fish',   emoji:'🐟', category:'Saltwater',  price:580, stock:12, active:true,  custom:false},
  {id:6, name:'Mackerel',    emoji:'🐠', category:'Saltwater',  price:200, stock:25, active:true,  custom:false},
  {id:7, name:'Katla',       emoji:'🐟', category:'Freshwater', price:280, stock:20, active:true,  custom:false},
  {id:8, name:'Sardine',     emoji:'🐟', category:'Saltwater',  price:160, stock:30, active:true,  custom:false},

const initOrders = [
  {id:'#FF2431', customer:'Rajan Kumar',   phone:'9876543210', address:'Kowdiar, Trivandrum',    items:'Rohu 1.5kg, Prawns 0.5kg', total:630, status:'Pending',    time:'9:12 AM'},
  {id:'#FF2432', customer:'Sunitha Menon', phone:'9845123456', address:'Pattom, Trivandrum',      items:'Pomfret 1kg, Sardine 1kg', total:580, status:'Delivered',  time:'8:40 AM'},
  {id:'#FF2433', customer:'Mohammed Aziz', phone:'9744567890', address:'Thampanoor, Trivandrum',  items:'Seer Fish 2kg',           total:1160,status:'Delivered',  time:'8:05 AM'},
  {id:'#FF2434', customer:'Lakshmi Nair',  phone:'9562345678', address:'Vellayambalam, Trivandrum',items:'Katla 1kg, Crab 0.5kg',  total:605, status:'Pending',    time:'9:35 AM'},
  {id:'#FF2435', customer:'Thomas George', phone:'9446789012', address:'Ambalamukku, Trivandrum', items:'Mackerel 2kg, Prawns 1kg',total:720, status:'Out for Delivery',time:'9:00 AM'},
  {id:'#FF2436', customer:'Priya Pillai',  phone:'9388765432', address:'Kesavadasapuram, TVM',   items:'Rohu 2kg',                total:520, status:'Confirmed',   time:'9:48 AM'},
];

const initCustomers = [
  {id:1, name:'Rajan Kumar',   phone:'9876543210', address:'Kowdiar, Trivandrum',    orders:8,  total:4280, joined:'Jan 2026'},
  {id:2, name:'Sunitha Menon', phone:'9845123456', address:'Pattom, Trivandrum',     orders:5,  total:2900, joined:'Feb 2026'},
  {id:3, name:'Mohammed Aziz', phone:'9744567890', address:'Thampanoor, Trivandrum', orders:12, total:7600, joined:'Jan 2026'},
  {id:4, name:'Lakshmi Nair',  phone:'9562345678', address:'Vellayambalam, TVM',     orders:3,  total:1560, joined:'Mar 2026'},
  {id:5, name:'Thomas George', phone:'9446789012', address:'Ambalamukku, TVM',       orders:6,  total:3240, joined:'Feb 2026'},
  {id:6, name:'Priya Pillai',  phone:'9388765432', address:'Kesavadasapuram, TVM',   orders:9,  total:5100, joined:'Jan 2026'},
];

const FISH_PRESETS = [
  {emoji:'🐟',name:'Rohu'},{emoji:'🐡',name:'Pomfret'},{emoji:'🦐',name:'Tiger Prawns'},
  {emoji:'🦀',name:'Mud Crab'},{emoji:'🐟',name:'Seer Fish'},{emoji:'🐠',name:'Mackerel'},
  {emoji:'🐟',name:'Katla'},{emoji:'🐟',name:'Sardine'},{emoji:'🦐',name:'Small Prawns'},
  {emoji:'🦀',name:'Blue Crab'},{emoji:'🐟',name:'Tilapia'},{emoji:'🐟',name:'Tuna'},
  {emoji:'🦑',name:'Squid'},{emoji:'🦞',name:'Lobster'},{emoji:'🐟',name:'Red Snapper'},
];

// ─── HELPERS ───────────────────────────────────────────────
function Badge({type, children}) {
  const map = {success:'badge-success',warning:'badge-warning',blue:'badge-blue',orange:'badge-orange',gray:'badge-gray'};
  return <span className={`badge ${map[type]||'badge-gray'}`}>{children}</span>;
}

function statusBadge(s) {
  const m = {
    'Delivered':<Badge type="success">✓ Delivered</Badge>,
    'Pending':<Badge type="warning">● Pending</Badge>,
    'Out for Delivery':<Badge type="blue">🛵 Out for Delivery</Badge>,
    'Confirmed':<Badge type="orange">✔ Confirmed</Badge>,
    'Cancelled':<Badge type="gray">✕ Cancelled</Badge>,
  };
  return m[s] || <Badge type="gray">{s}</Badge>;
}

function Modal({onClose, title, children}) {
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal fade-in">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
          <div style={{fontSize:18,fontWeight:800,color:'#F1F5F9'}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748B',fontSize:22,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── SIDEBAR ───────────────────────────────────────────────
function Sidebar({page, setPage}) {
  const nav = [
    {id:'dashboard',   icon:'📊', label:'Dashboard'},
    {id:'products',    icon:'🐟', label:'Products'},
    {id:'orders',      icon:'📦', label:'Orders'},
    {id:'customers',   icon:'👥', label:'Customers'},
    {id:'report',      icon:'📈', label:'Daily Report'},
    {id:'servicearea', icon:'📍', label:'Service Area'},
  ];
  return (
    <div className="sidebar">
      <div style={{padding:'24px 20px 16px',borderBottom:'1px solid #1E2D42'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:38,height:38,background:'linear-gradient(135deg,#FF6B4A,#FF8C6E)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🐟</div>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:'#F1F5F9',letterSpacing:'-.2px'}}>FishFresh</div>
            <div style={{fontSize:10,color:'#64748B',fontWeight:600,letterSpacing:.5}}>ADMIN PANEL</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,padding:'12px 0',overflowY:'auto'}}>
        {nav.map(n=>(
          <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
            <span style={{fontSize:16}}>{n.icon}</span>
            <span>{n.label}</span>
            {n.id==='orders' && <span style={{marginLeft:'auto',background:'#FF6B4A',color:'white',borderRadius:20,padding:'1px 7px',fontSize:11,fontWeight:800}}>2</span>}
          </div>
        ))}
      </div>
      <div style={{padding:'16px 20px',borderTop:'1px solid #1E2D42'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,background:'#1A2436',borderRadius:50,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>👤</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#CBD5E1'}}>Admin</div>
            <div style={{fontSize:11,color:'#64748B'}}>admin@fishfresh.in</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ─────────────────────────────────────────────
function Dashboard() {
  const stats = [
    {label:"Today's Orders",    value:24,  icon:'📦', color:'#FF6B4A', change:'+4 from yesterday'},
    {label:"Today's Revenue",   value:'₹14,280', icon:'💰', color:'#22C55E', change:'+₹2,100 from yesterday'},
    {label:'Delivered',         value:18,  icon:'✅', color:'#3B82F6', change:'75% completion'},
    {label:'Pending Delivery',  value:6,   icon:'🛵', color:'#EAB308', change:'3 assigned'},
  ];
  const topFish = [
    {name:'Rohu',         sold:45, revenue:11700, pct:90},
    {name:'Tiger Prawns', sold:28, revenue:13440, pct:56},
    {name:'Pomfret',      sold:22, revenue:9240,  pct:44},
    {name:'Seer Fish',    sold:18, revenue:10440, pct:36},
    {name:'Mackerel',     sold:35, revenue:7000,  pct:70},
  ];

    <div className="fade-in">
      <div style={{marginBottom:28}}>
        <div className="section-title">Good morning, Admin 👋</div>
        <div style={{color:'#64748B',marginTop:4,fontSize:14}}>Thursday, 12 March 2026 — Here's what's happening today</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
        {stats.map((s,i)=>(
          <div key={i} className="stat-card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div style={{fontSize:28}}>{s.icon}</div>
              <div style={{fontSize:11,color:'#64748B',background:'#1E2D42',padding:'3px 10px',borderRadius:20,fontWeight:600}}>{s.change}</div>
            </div>
            <div style={{fontSize:30,fontWeight:800,color:s.color,letterSpacing:'-1px'}}>{s.value}</div>
            <div style={{fontSize:13,color:'#64748B',marginTop:4,fontWeight:600}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:20}}>
        <div className="card">
          <div style={{fontWeight:800,color:'#F1F5F9',marginBottom:20,fontSize:15}}>🔥 Top Selling Fish Today</div>
          {topFish.map((f,i)=>(
            <div key={i} style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{color:'#CBD5E1',fontWeight:600,fontSize:13}}>{f.name}</span>
                <div style={{display:'flex',gap:14}}>
                  <span style={{color:'#64748B',fontSize:12}}>{f.sold} sold</span>
                  <span style={{color:'#22C55E',fontWeight:700,fontSize:13}}>₹{f.revenue.toLocaleString()}</span>
                </div>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{width:`${f.pct}%`}}/>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div style={{fontWeight:800,color:'#F1F5F9',marginBottom:20,fontSize:15}}>📦 Recent Orders</div>
          {initOrders.slice(0,5).map((o,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,paddingBottom:14,borderBottom:i<4?'1px solid #1E2D42':'none'}}>
              <div style={{width:36,height:36,background:'#1A2436',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#FF6B4A',flexShrink:0}}>{o.id.slice(-2)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:'#CBD5E1'}}>{o.customer}</div>

}

// ─── PRODUCTS ──────────────────────────────────────────────
function Products() {
  const [prods, setProds] = useState(initProducts);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({name:'',emoji:'',category:'Freshwater',price:'',stock:'',custom:false,customEmoji:''});
  const [selectedPreset, setSelectedPreset] = useState(null);
  const [useCustom, setUseCustom] = useState(false);

  const openAdd = () => {
    setEditing(null);
    setForm({name:'',emoji:'',category:'Freshwater',price:'',stock:'',custom:false});
    setSelectedPreset(null);
    setUseCustom(false);
    setShowModal(true);
  };
  const openEdit = (p) => {
    setEditing(p);
    setForm({name:p.name,emoji:p.emoji,category:p.category,price:String(p.price),stock:String(p.stock)});
    setSelectedPreset(null);
    setUseCustom(p.custom||false);
    setShowModal(true);
  };
  const save = () => {
    const emoji = useCustom ? form.emoji : (selectedPreset ? selectedPreset.emoji : form.emoji);
    const name  = useCustom ? form.name  : (selectedPreset ? selectedPreset.name  : form.name);
    if(!name||!form.price) return;
    if(editing) {
      setProds(prods.map(p=>p.id===editing.id?{...p,...form,emoji,name,price:Number(form.price),stock:Number(form.stock)}:p));
    } else {
      setProds([...prods,{id:Date.now(),name,emoji,category:form.category,price:Number(form.price),stock:Number(form.stock),active:true,custom:useCustom}]);
    }
    setShowModal(false);
  };
  const toggle = (id) => setProds(prods.map(p=>p.id===id?{...p,active:!p.active}:p));
  const del = (id) => setProds(prods.filter(p=>p.id!==id));

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <div className="section-title">Manage Products</div>
          <div style={{color:'#64748B',fontSize:14,marginTop:3}}>{prods.length} products total</div>
        </div>
        <button className="btn-primary" onClick={openAdd}>+ Add Fish Product</button>
      </div>
      <div className="card" style={{padding:0}}>
        <table>
          <thead><tr>
            <th>Fish</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>
            {prods.map(p=>(
              <tr key={p.id}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:44,height:44,background:'#1A2436',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{p.emoji}</div>
                    <div>
                      <div style={{fontWeight:700,color:'#F1F5F9',fontSize:14}}>{p.name}</div>
                      {p.custom && <div style={{fontSize:10,color:'#FF6B4A',fontWeight:600}}>Custom Photo</div>}
                    </div>
                  </div>
                </td>
                <td><Badge type="blue">{p.category}</Badge></td>
                <td><span style={{fontWeight:700,color:'#22C55E',fontSize:15}}>₹{p.price}</span><span style={{color:'#64748B',fontSize:12}}>/kg</span></td>
                <td>
                  <span style={{color:p.stock<10?'#EF4444':p.stock<15?'#EAB308':'#CBD5E1',fontWeight:700}}>{p.stock} kg</span>
                  {p.stock<10&&<div style={{fontSize:10,color:'#EF4444'}}>⚠ Low stock</div>}
                </td>
                <td>
                  <label className="toggle">
                    <input type="checkbox" checked={p.active} onChange={()=>toggle(p.id)}/>
                    <span className="slider"/>
                  </label>
                </td>
                <td>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-outline" onClick={()=>openEdit(p)}>Edit</button>
                    <button className="btn-danger" onClick={()=>del(p.id)}>Delete</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showModal && (

function ServiceArea() {
  const [pincodes, setPincodes] = useState([
    {id:1, pin:'695001', area:'Thiruvananthapuram East',  district:'Thiruvananthapuram', active:true,  orders:42},
    {id:2, pin:'695002', area:'Thiruvananthapuram West',  district:'Thiruvananthapuram', active:true,  orders:38},
    {id:3, pin:'695003', area:'Kowdiar',                  district:'Thiruvananthapuram', active:true,  orders:55},
    {id:4, pin:'695004', area:'Pattom',                   district:'Thiruvananthapuram', active:true,  orders:29},
    {id:5, pin:'695005', area:'Vellayambalam',            district:'Thiruvananthapuram', active:true,  orders:31},
    {id:6, pin:'695006', area:'Kesavadasapuram',          district:'Thiruvananthapuram', active:false, orders:0},
    {id:7, pin:'695007', area:'Ambalamukku',              district:'Thiruvananthapuram', active:true,  orders:18},
    {id:8, pin:'695008', area:'Thampanoor',               district:'Thiruvananthapuram', active:false, orders:0},
  ]);

  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({pin:'', area:'', district:'Thiruvananthapuram'});
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('All');
  const [bulkInput, setBulkInput] = useState('');
  const [showBulk, setShowBulk] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const activeCount   = pincodes.filter(p=>p.active).length;
  const inactiveCount = pincodes.filter(p=>!p.active).length;
  const totalOrders   = pincodes.reduce((a,p)=>a+p.orders,0);

  const filtered = pincodes.filter(p=>{
    const matchSearch = p.pin.includes(search) || p.area.toLowerCase().includes(search.toLowerCase());
    const matchStatus = filterStatus==='All' ? true : filterStatus==='Active' ? p.active : !p.active;
    return matchSearch && matchStatus;
  });

  const toggle = (id) => setPincodes(pincodes.map(p=>p.id===id?{...p,active:!p.active}:p));

  const addPin = () => {
    if(form.pin.length!==6||!form.area) return;
    if(pincodes.find(p=>p.pin===form.pin)) { alert('PIN code already exists!'); return; }
    setPincodes([...pincodes,{id:Date.now(),pin:form.pin,area:form.area,district:form.district,active:true,orders:0}]);
    setForm({pin:'',area:'',district:'Thiruvananthapuram'});
    setShowModal(false);
  };

  const deletePin = (id) => { setPincodes(pincodes.filter(p=>p.id!==id)); setConfirmDelete(null); };

  const addBulk = () => {
    const lines = bulkInput.split('\n').map(l=>l.trim()).filter(l=>l);
    const newPins = [];
    lines.forEach(line=>{
      const parts = line.split(',').map(s=>s.trim());
      if(parts[0]?.length===6 && !pincodes.find(p=>p.pin===parts[0])) {
        newPins.push({id:Date.now()+Math.random(),pin:parts[0],area:parts[1]||'Unknown Area',district:parts[2]||'Thiruvananthapuram',active:true,orders:0});
      }
    });
    if(newPins.length===0){alert('No valid new PIN codes found.\nFormat: 695001, Area Name, District');return;}
    setPincodes([...pincodes,...newPins]);
    setBulkInput('');
    setShowBulk(false);

// ─── PASSWORD STRENGTH CHECKER ─────────────────────────────
function checkStrength(pwd) {
  const rules = [
    { label: 'At least 8 characters',       ok: pwd.length >= 8 },
    { label: 'One uppercase letter (A-Z)',   ok: /[A-Z]/.test(pwd) },
    { label: 'One lowercase letter (a-z)',   ok: /[a-z]/.test(pwd) },
    { label: 'One number (0-9)',             ok: /[0-9]/.test(pwd) },
    { label: 'One special character (!@#$)', ok: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd) },
  ];
  const passed = rules.filter(r => r.ok).length;
  const strength = passed <= 2 ? 'Weak' : passed <= 4 ? 'Medium' : 'Strong';
  const color    = passed <= 2 ? '#EF4444' : passed <= 4 ? '#EAB308' : '#22C55E';
  return { rules, passed, strength, color };
}

function LoginScreen({ onLogin }) {
  const [email, setEmail]       = useState('');
  const [pwd, setPwd]           = useState('');
  const [showPwd, setShowPwd]   = useState(false);
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);
  const [view, setView]         = useState('login'); // 'login' | 'forgot' | 'reset' | 'sent'
  const [resetEmail, setResetEmail] = useState('');
  const [resetMsg, setResetMsg] = useState('');
  const [newPwd, setNewPwd]     = useState('');
  const [confirmPwd, setConfirmPwd] = useState('');
  const [showNew, setShowNew]   = useState(false);
  const strength = checkStrength(newPwd);

  // Check if redirected back from password reset email link
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.includes('type=recovery')) {
      setView('reset');
    }
  }, []);

  const handleLogin = async () => {
    setError(''); setLoading(true);
    try {
      const { error: err } = await supabase.auth.signInWithPassword({ email, password: pwd });
      if (err) { setError(err.message); setLoading(false); return; }
      onLogin();
    } catch(e) { setError('Connection failed. Check your Supabase URL & Key.'); setLoading(false); }
  };

  const handleForgot = async () => {
    if (!resetEmail) { setResetMsg('Please enter your email.'); return; }
    setLoading(true); setResetMsg('');
    try {
      const { error: err } = await supabase.auth.resetPasswordForEmail(resetEmail, {
        redirectTo: window.location.href,
      });
      if (err) { setResetMsg(err.message); setLoading(false); return; }
      setView('sent');
    } catch(e) { setResetMsg('Connection failed.'); }
    setLoading(false);
  };

  const handleReset = async () => {
    if (newPwd !== confirmPwd) { setError('Passwords do not match.'); return; }
    if (strength.passed < 5)  { setError('Password is not strong enough.'); return; }
    setLoading(true); setError('');
    try {
      const { error: err } = await supabase.auth.updateUser({ password: newPwd });
      if (err) { setError(err.message); setLoading(false); return; }
      window.location.hash = '';
      setView('login');
      setError('');
      alert('✅ Password updated successfully! Please log in with your new password.');

  );

  // ── LOGIN VIEW ──
  if(view === 'login') return (
    <div style={centerBox}><div style={box}>
      {logoBlock}

      <div style={{marginBottom:8}}>
        <label className="label">Password</label>
        <div style={{position:'relative'}}>
          <input className="input" type={showPwd?'text':'password'} placeholder="Enter your password"
            value={pwd} onChange={e=>{setPwd(e.target.value);setError('');}}

            style={{paddingRight:48}}/>

            style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',
              background:'none',border:'none',cursor:'pointer',color:'#64748B',fontSize:16}}>
            {showPwd?'🙈':'👁️'}
          </button>
        </div>
      </div>
      <div style={{textAlign:'right',marginBottom:20}}>
        <button onClick={()=>setView('forgot')}
          style={{background:'none',border:'none',color:'#FF6B4A',fontSize:13,fontWeight:700,
            cursor:'pointer',fontFamily:'Plus Jakarta Sans'}}>
          Forgot Password?
        </button>
      </div>
      {error && (
        <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',
          borderRadius:10,padding:'10px 14px',color:'#EF4444',fontSize:13,marginBottom:16,textAlign:'center'}}>
          ⚠️ {error}
        </div>
      )}
      <button className="btn-primary" style={{width:'100%',padding:14,fontSize:15}}

      <div style={{marginTop:24,background:'#1A2436',borderRadius:12,padding:'12px 16px',fontSize:12,color:'#64748B'}}>
        🔒 <strong style={{color:'#94A3B8'}}>Secure Login</strong> — Powered by Supabase Auth.<br/>
        Your session stays active until you log out.
      </div>
    </div></div>
  );

  // ── FORGOT PASSWORD VIEW ──
  if(view === 'forgot') return (
    <div style={centerBox}><div style={box}>
      {logoBlock}
      <div style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',
        borderRadius:12,padding:'12px 16px',fontSize:13,color:'#94A3B8',marginBottom:20,lineHeight:1.7}}>
        📧 Enter your admin email. We'll send a <strong style={{color:'#F1F5F9'}}>password reset link</strong> to your inbox.
      </div>

  // ── RESET PASSWORD VIEW (after clicking email link) ──
  if(view === 'reset') return (

            ))}

          <div style={{display:'grid',gap:4}}>
            {strength.rules.map((r,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>

    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if(session?.user?.email) setAdminEmail(session.user.email);
      setChecking(false);
    });
    // Listen for auth changes (login, logout, password reset)
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      if(session?.user?.email) setAdminEmail(session.user.email);
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleLogout = async () => {
    await supabase.auth.signOut();
    setSession(null);
  };

  // Loading state while checking session
  if(checking) return (
    <div style={{minHeight:'100vh',background:'#0A1020',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:16}}>🐟</div>
        <div style={{color:'#64748B',fontSize:14}}>Loading...</div>
      </div>
    </div>
  );

  // Not logged in → show login screen
  if(!session) return <LoginScreen onLogin={()=>supabase.auth.getSession().then(({data:{session}})=>setSession(session))}/>;

  const pages = {
    dashboard:   <Dashboard/>,
    products:    <Products/>,
    orders:      <Orders/>,
    customers:   <Customers/>,
    report:      <DailyReport/>,
    servicearea: <ServiceArea/>,
  };

  const now = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  return (
    <div>
      <Sidebar page={page} setPage={setPage}/>
      <div className="main">
        <div className="topbar">
          <div style={{flex:1,fontSize:15,fontWeight:700,color:'#F1F5F9',textTransform:'capitalize'}}>
            {page==='servicearea' ? 'Service Area' : page.charAt(0).toUpperCase()+page.slice(1)}
          </div>
          <div style={{background:'#1A2436',padding:'6px 14px',borderRadius:30,fontSize:12,color:'#64748B',fontWeight:600}}>
            📅 {now}
          </div>
          <div style={{background:'#1A2436',padding:'6px 14px',borderRadius:30,fontSize:12,color:'#94A3B8',fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:7,height:7,background:'#22C55E',borderRadius:'50%',display:'inline-block'}}/>
            {adminEmail}
          </div>
          <button onClick={handleLogout} className="btn-outline" style={{padding:'7px 14px',color:'#EF4444',borderColor:'rgba(239,68,68,.3)'}}>
            Logout
          </button>
        </div>
        <div className="content">{pages[page]}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
